<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Supreme Model T-X dark-mode logo">
  <!-- Dark-mode variant — optimised for very dark backgrounds, reduced glow -->
  <defs>
    <linearGradient id="dm-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1A8"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A900"/>
    </linearGradient>
    <linearGradient id="dm-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="dm-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Crown emblem -->
  <g transform="translate(14, 10)">
    <rect x="0" y="32" width="44" height="8" rx="2.5" fill="url(#dm-gold)"/>
    <polygon points="2,32 2,12 11,20 22,4 33,20 42,12 42,32" fill="url(#dm-gold)"/>
    <ellipse cx="22" cy="5" rx="4" ry="3" fill="#E0F2FE" opacity="0.9"/>
    <circle cx="3" cy="14" r="2.5" fill="#86EFAC" opacity="0.85"/>
    <circle cx="41" cy="14" r="2.5" fill="#86EFAC" opacity="0.85"/>
    <circle cx="10" cy="44" r="2" fill="url(#dm-cyan)" opacity="0.7"/>
    <circle cx="22" cy="44" r="2" fill="url(#dm-cyan)" opacity="0.7"/>
    <circle cx="34" cy="44" r="2" fill="url(#dm-cyan)" opacity="0.7"/>
    <line x1="10" y1="44" x2="22" y2="44" stroke="url(#dm-cyan)" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="44" x2="34" y2="44" stroke="url(#dm-cyan)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="32" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="800" fill="url(#dm-emerald)">S</text>
  <text x="91" y="32" font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="700" fill="#E2E8F0">UPREME</text>
  <text x="72" y="56" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="700" fill="url(#dm-gold)" letter-spacing="1.5">MODEL T‑X</text>
  <line x1="72" y1="36" x2="300" y2="36" stroke="#475569" stroke-width="0.5" opacity="0.6"/>
  <text x="72" y="72" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="500" fill="#475569" letter-spacing="0.8">T‑SERIES AUTONOMOUS GOVERNANCE MODELS</text>
</svg>
