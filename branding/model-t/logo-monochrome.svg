<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Supreme Model T-X monochrome logo">
  <!-- Monochrome variant — single colour, suitable for print and embossing -->

  <!-- Crown emblem outline -->
  <g transform="translate(14, 10)">
    <rect x="0" y="32" width="44" height="8" rx="2.5" fill="#111111"/>
    <polygon points="2,32 2,12 11,20 22,4 33,20 42,12 42,32" fill="#111111"/>
    <ellipse cx="22" cy="5" rx="4" ry="3" fill="#333333"/>
    <circle cx="3" cy="14" r="2.5" fill="#333333"/>
    <circle cx="41" cy="14" r="2.5" fill="#333333"/>
    <circle cx="10" cy="44" r="2" fill="#666666"/>
    <circle cx="22" cy="44" r="2" fill="#666666"/>
    <circle cx="34" cy="44" r="2" fill="#666666"/>
    <line x1="10" y1="44" x2="22" y2="44" stroke="#666666" stroke-width="1"/>
    <line x1="22" y1="44" x2="34" y2="44" stroke="#666666" stroke-width="1"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="32" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="800" fill="#111111">S</text>
  <text x="91" y="32" font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="700" fill="#333333">UPREME</text>
  <text x="72" y="56" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="700" fill="#111111" letter-spacing="1.5">MODEL T‑X</text>
  <line x1="72" y1="36" x2="300" y2="36" stroke="#AAAAAA" stroke-width="0.5"/>
  <text x="72" y="72" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="500" fill="#888888" letter-spacing="0.8">T‑SERIES AUTONOMOUS GOVERNANCE MODELS</text>
</svg>
