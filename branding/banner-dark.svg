<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#050A0E"/>
    </radialGradient>
    <!-- Gold -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Silver text -->
    <linearGradient id="silverTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#D0D0D0"/>
      <stop offset="70%"  stop-color="#909090"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Emerald -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="40%"  stop-color="#50C878"/>
      <stop offset="80%"  stop-color="#2E8B57"/>
      <stop offset="100%" stop-color="#50C878"/>
    </linearGradient>
    <!-- Diamond -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#A8D8EA"/>
      <stop offset="65%"  stop-color="#E8F4F8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Rainbow gradient for mascot -->
    <linearGradient id="rainbowBrain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60D0F0"/>
      <stop offset="35%"  stop-color="#7C3AED"/>
      <stop offset="70%"  stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="mascotOrbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00B4DB"/>
      <stop offset="50%"  stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>

    <!-- Divider gradient -->
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="30%"  stop-color="#FFD700"/>
      <stop offset="70%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#50C878" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle top border line gold -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldGrad)"/>
  <rect x="0" y="397" width="1200" height="3" fill="url(#goldGrad)"/>

  <!-- Star field -->
  <g opacity="0.5">
    <circle cx="30"  cy="30"  r="1"  fill="white"/>
    <circle cx="100" cy="80"  r="0.8" fill="white"/>
    <circle cx="200" cy="20"  r="1.2" fill="white"/>
    <circle cx="950" cy="40"  r="1"  fill="white"/>
    <circle cx="1050" cy="90" r="0.8" fill="white"/>
    <circle cx="1150" cy="30" r="1.1" fill="white"/>
    <circle cx="1180" cy="350" r="0.9" fill="white"/>
    <circle cx="60"  cy="360" r="1"  fill="white"/>
    <circle cx="900" cy="370" r="0.7" fill="white"/>
  </g>

  <!-- ═══════ LEFT: MASCOT ═══════ -->
  <g transform="translate(200, 200) scale(1.1)">
    <!-- Orbit ring back -->
    <path d="M -110,55 A 120,46 -30 0 0 92,-37"
          fill="none" stroke="url(#mascotOrbit)" stroke-width="13" stroke-linecap="round" opacity="0.85"/>
    <!-- Brain body -->
    <ellipse cx="8" cy="-8" rx="82" ry="72" fill="url(#rainbowBrain)" opacity="0.95"/>
    <!-- Left lobe -->
    <ellipse cx="-50" cy="8" rx="36" ry="30" fill="#9B59B6" opacity="0.88"/>
    <!-- Highlight -->
    <ellipse cx="12" cy="-45" rx="25" ry="10" fill="rgba(255,255,255,0.22)"/>
    <!-- Rainbow swirl accent -->
    <path d="M 45,-45 Q 73,-55 82,-37 Q 87,-23 68,-18"
          fill="none" stroke="#FACC15" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
    <path d="M 45,-45 Q 73,-55 82,-37"
          fill="none" stroke="#4ADE80" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Bottom half -->
    <path d="M -82,-8 Q -72,65 8,68 Q 84,68 88,-8 Z" fill="#EC4899" opacity="0.5"/>
    <!-- Tendrils -->
    <path d="M -18,65 Q -28,88 -36,73 Q -45,58 -28,55"
          fill="none" stroke="#C026D3" stroke-width="11" stroke-linecap="round"/>
    <path d="M 8,67 Q 4,96 0,82"
          fill="none" stroke="url(#mascotOrbit)" stroke-width="9" stroke-linecap="round"/>
    <path d="M 32,63 Q 50,93 59,73 Q 64,58 50,53"
          fill="none" stroke="#9B59B6" stroke-width="9" stroke-linecap="round"/>
    <!-- Orbit ring front -->
    <path d="M -120,12 A 120,46 -30 0 1 100,-50"
          fill="none" stroke="url(#mascotOrbit)" stroke-width="13" stroke-linecap="round" opacity="0.95"/>
    <!-- Orbit dot -->
    <circle cx="99" cy="-52" r="8" fill="#3B82F6" opacity="0.9"/>
    <circle cx="99" cy="-52" r="5" fill="#60D0F0"/>
    <!-- Top arc -->
    <path d="M -115,2 Q -128,-55 -65,-78"
          fill="none" stroke="#5EEAD4" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
    <!-- Eyes smile -->
    <path d="M -14,-22 Q -9,-29 -4,-22"  fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 18,-22 Q 23,-29 28,-22"   fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Divider -->
  <rect x="385" y="30" width="2" height="340" fill="url(#divGrad)" opacity="0.6"/>

  <!-- ═══════ CROWN (small, right section) ═══════ -->
  <g transform="translate(790, 155) scale(0.7)">
    <!-- Base band -->
    <ellipse cx="0" cy="82" rx="132" ry="20" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="75" rx="132" ry="16" fill="none" stroke="silver" stroke-width="3"/>
    <polygon points="0,66 7,73 0,80 -7,73"  fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="1"/>
    <circle cx="-85" cy="74" r="4" fill="silver"/>
    <circle cx="85"  cy="74" r="4" fill="silver"/>

    <!-- Left spike -->
    <path d="M -132,76 L-158,-42 L-90,52 Z" fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="-158" cy="-42" r="6" fill="url(#goldGrad)"/>
    <circle cx="-158" cy="-42" r="3.5" fill="silver"/>

    <!-- Right spike -->
    <path d="M 132,76 L158,-42 L90,52 Z"  fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="158" cy="-42" r="6" fill="url(#goldGrad)"/>
    <circle cx="158" cy="-42" r="3.5" fill="silver"/>

    <!-- Center spike -->
    <path d="M-52,68 L0,-95 L52,68 Z"     fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="3.5"/>
    <polygon points="0,-28 11,-18 0,-8 -11,-18" fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="1.5"/>
    <circle cx="0" cy="-95" r="7" fill="url(#goldGrad)"/>
    <circle cx="0" cy="-95" r="4" fill="silver"/>

    <!-- Crown body fill -->
    <path d="M-132,76 L-90,52 L-52,68 L0,-95 L52,68 L90,52 L132,76 L132,82 L-132,82 Z"
          fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="2"/>
  </g>

  <!-- ═══════ RIGHT: SUPREME AI TEXT ═══════ -->
  <!-- Emerald S -->
  <g filter="url(#emeraldGlow)">
    <text x="410" y="230"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="68" font-weight="bold"
          fill="url(#emeraldGrad)" stroke="#1A6B3A" stroke-width="2">S</text>
  </g>

  <!-- UPREME silver -->
  <text x="460" y="230"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="68" font-weight="bold"
        fill="url(#silverTextGrad)" stroke="#606060" stroke-width="1.2"
        letter-spacing="2" filter="url(#textGlow)">UPREME</text>

  <!-- AI diamond -->
  <text x="415" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="90" font-weight="bold"
        fill="url(#diamondGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"
        letter-spacing="6" filter="url(#textGlow)">ai</text>

  <!-- Diamond sparkle above 'i' dot -->
  <polygon points="565,195 571,203 565,211 559,203"
           fill="#E8F4F8" stroke="white" stroke-width="1" opacity="0.85"/>

  <!-- Lens flare -->
  <g transform="translate(490, 260)" opacity="0.5">
    <line x1="0" y1="-18" x2="0" y2="18"   stroke="white" stroke-width="1.2"/>
    <line x1="-18" y1="0" x2="18" y2="0"   stroke="white" stroke-width="1.2"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="white" stroke-width="0.8"/>
    <line x1="12"  y1="-12" x2="-12" y2="12" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="370"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" fill="#94A3B8" letter-spacing="4" text-anchor="middle">
    THE ULTIMATE AI PLATFORM
  </text>
</svg>
