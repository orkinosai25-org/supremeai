<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="GrooveMaker banner">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="b-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#010812"/>
      <stop offset="50%"  stop-color="#020E1C"/>
      <stop offset="100%" stop-color="#010812"/>
    </linearGradient>
    <!-- Metallic silver text gradient -->
    <linearGradient id="b-silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0F5FA"/>
      <stop offset="20%"  stop-color="#C8D8E8"/>
      <stop offset="50%"  stop-color="#8099B8"/>
      <stop offset="80%"  stop-color="#B8CCDE"/>
      <stop offset="100%" stop-color="#E4EEF8"/>
    </linearGradient>
    <!-- Electric blue gradient -->
    <linearGradient id="b-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00DFFF"/>
      <stop offset="50%"  stop-color="#0096FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
    <!-- Horizontal scanner line -->
    <linearGradient id="b-scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#00BFFF" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#4FC3F7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Metallic surface shine -->
    <linearGradient id="b-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="b-glow-blue" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="b-glow-silver" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="b-glow-big" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#b-bg)"/>
  <!-- Subtle surface shine -->
  <rect width="1200" height="400" fill="url(#b-shine)"/>

  <!-- Starfield dots -->
  <circle cx="80"   cy="30"  r="1"   fill="#C8D8E8" opacity="0.6"/>
  <circle cx="200"  cy="80"  r="1.5" fill="#8899AA" opacity="0.5"/>
  <circle cx="340"  cy="20"  r="1"   fill="#00CFFF" opacity="0.7"/>
  <circle cx="450"  cy="60"  r="1"   fill="#C8D8E8" opacity="0.4"/>
  <circle cx="600"  cy="15"  r="2"   fill="#4FC3F7" opacity="0.6"/>
  <circle cx="750"  cy="45"  r="1"   fill="#C8D8E8" opacity="0.5"/>
  <circle cx="900"  cy="25"  r="1.5" fill="#00CFFF" opacity="0.8"/>
  <circle cx="1050" cy="55"  r="1"   fill="#8899AA" opacity="0.6"/>
  <circle cx="1150" cy="35"  r="1"   fill="#C8D8E8" opacity="0.5"/>
  <circle cx="120"  cy="350" r="1"   fill="#4FC3F7" opacity="0.4"/>
  <circle cx="280"  cy="370" r="1.5" fill="#C8D8E8" opacity="0.5"/>
  <circle cx="520"  cy="380" r="1"   fill="#00CFFF" opacity="0.6"/>
  <circle cx="780"  cy="360" r="1"   fill="#8899AA" opacity="0.5"/>
  <circle cx="980"  cy="385" r="1.5" fill="#C8D8E8" opacity="0.4"/>
  <circle cx="1100" cy="355" r="1"   fill="#4FC3F7" opacity="0.7"/>

  <!-- Decorative circuit/grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#0078D4" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#C8D8E8" stroke-width="0.3" opacity="0.07"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#C8D8E8" stroke-width="0.3" opacity="0.07"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#C8D8E8" stroke-width="0.3" opacity="0.05"/>
  <line x1="900" y1="0" x2="900" y2="400" stroke="#C8D8E8" stroke-width="0.3" opacity="0.05"/>

  <!-- Horizontal scanning line (Star Wars scanner vibe) -->
  <rect x="0" y="197" width="1200" height="6" fill="url(#b-scan)" opacity="0.5"/>

  <!-- Left ornament: film strip -->
  <g transform="translate(60, 140)" opacity="0.8">
    <rect x="0" y="0" width="18" height="120" rx="3" fill="none" stroke="url(#b-silver)" stroke-width="1.2"/>
    <rect x="3" y="8"   width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="30"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="52"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="74"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="96"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
  </g>

  <!-- Right ornament: film strip -->
  <g transform="translate(1122, 140)" opacity="0.8">
    <rect x="0" y="0" width="18" height="120" rx="3" fill="none" stroke="url(#b-silver)" stroke-width="1.2"/>
    <rect x="3" y="8"   width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="30"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="52"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="74"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
    <rect x="3" y="96"  width="12" height="16" rx="1.5" fill="#0078D4" opacity="0.25"/>
  </g>

  <!-- Large waveform (centre left accent) -->
  <g transform="translate(110, 130)" filter="url(#b-glow-blue)" opacity="0.55">
    <rect x="0"   y="50" width="10" height="30" rx="3" fill="url(#b-blue)"/>
    <rect x="14"  y="30" width="10" height="70" rx="3" fill="url(#b-blue)"/>
    <rect x="28"  y="10" width="10" height="110" rx="3" fill="url(#b-silver)"/>
    <rect x="42"  y="25" width="10" height="80" rx="3" fill="url(#b-blue)"/>
    <rect x="56"  y="40" width="10" height="50" rx="3" fill="url(#b-blue)"/>
    <rect x="70"  y="55" width="10" height="20" rx="3" fill="url(#b-blue)"/>
  </g>

  <!-- Right waveform mirror -->
  <g transform="translate(1010, 130) scale(-1,1)" filter="url(#b-glow-blue)" opacity="0.55">
    <rect x="0"   y="50" width="10" height="30" rx="3" fill="url(#b-blue)"/>
    <rect x="14"  y="30" width="10" height="70" rx="3" fill="url(#b-blue)"/>
    <rect x="28"  y="10" width="10" height="110" rx="3" fill="url(#b-silver)"/>
    <rect x="42"  y="25" width="10" height="80" rx="3" fill="url(#b-blue)"/>
    <rect x="56"  y="40" width="10" height="50" rx="3" fill="url(#b-blue)"/>
    <rect x="70"  y="55" width="10" height="20" rx="3" fill="url(#b-blue)"/>
  </g>

  <!-- Main text: GROOVEMAKER -->
  <text x="600" y="210" text-anchor="middle"
        font-family="'Segoe UI','Inter',Arial,sans-serif"
        font-size="90" font-weight="900" letter-spacing="8"
        fill="url(#b-silver)" filter="url(#b-glow-silver)">GROOVEMAKER</text>

  <!-- Blue underline rule -->
  <rect x="200" y="225" width="800" height="3" rx="1.5" fill="url(#b-blue)" filter="url(#b-glow-blue)" opacity="0.9"/>

  <!-- Tagline -->
  <text x="600" y="270" text-anchor="middle"
        font-family="'Segoe UI','Inter',Arial,sans-serif"
        font-size="20" font-weight="500" letter-spacing="5"
        fill="#4FC3F7">AI-POWERED IMAGE &amp; VIDEO CREATION</text>

  <!-- Corner accent sparkles -->
  <g filter="url(#b-glow-blue)">
    <circle cx="200" cy="195" r="4" fill="#00DFFF" opacity="0.9"/>
    <circle cx="1000" cy="205" r="4" fill="#00DFFF" opacity="0.9"/>
    <circle cx="196" cy="228" r="2" fill="#4FC3F7" opacity="0.7"/>
    <circle cx="1004" cy="222" r="2" fill="#4FC3F7" opacity="0.7"/>
  </g>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="398" rx="0" fill="none"
        stroke="url(#b-silver)" stroke-width="1.5" opacity="0.25"/>
  <!-- Inner border -->
  <rect x="8" y="8" width="1184" height="384" rx="4" fill="none"
        stroke="#0078D4" stroke-width="0.75" opacity="0.3"/>
</svg>
