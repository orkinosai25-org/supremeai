<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="GrooveMaker logo">
  <defs>
    <!-- Metallic silver gradient -->
    <linearGradient id="gm-silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8EEF5"/>
      <stop offset="25%"  stop-color="#C0CDD8"/>
      <stop offset="50%"  stop-color="#8899AA"/>
      <stop offset="75%"  stop-color="#B0C0CF"/>
      <stop offset="100%" stop-color="#D8E4F0"/>
    </linearGradient>
    <!-- Electric blue accent gradient -->
    <linearGradient id="gm-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="50%"  stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005BB5"/>
    </linearGradient>
    <!-- Icon metallic -->
    <linearGradient id="gm-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#B0D4F0"/>
      <stop offset="40%"  stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="gm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="gm-text-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00BFFF" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background panel -->
  <rect x="2" y="2" width="236" height="76" rx="8" fill="#010B16" opacity="0.95"/>
  <rect x="2" y="2" width="236" height="76" rx="8" fill="none" stroke="url(#gm-silver)" stroke-width="1.2" opacity="0.5"/>

  <!-- Icon: stylised music-wave / film-strip hybrid -->
  <g transform="translate(14,20)" filter="url(#gm-glow)">
    <!-- Film strip left -->
    <rect x="0" y="0" width="6" height="40" rx="2" fill="url(#gm-icon)" opacity="0.85"/>
    <rect x="1" y="3"  width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="1" y="11" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="1" y="19" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="1" y="27" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="1" y="35" width="4" height="5" rx="1" fill="#010B16"/>
    <!-- Waveform bars (music vibe) -->
    <rect x="10" y="16" width="4" height="8"  rx="2" fill="url(#gm-blue)"/>
    <rect x="16" y="10" width="4" height="20" rx="2" fill="url(#gm-blue)"/>
    <rect x="22" y="4"  width="4" height="32" rx="2" fill="url(#gm-silver)"/>
    <rect x="28" y="10" width="4" height="20" rx="2" fill="url(#gm-blue)"/>
    <rect x="34" y="14" width="4" height="12" rx="2" fill="url(#gm-blue)"/>
    <!-- Film strip right -->
    <rect x="42" y="0" width="6" height="40" rx="2" fill="url(#gm-icon)" opacity="0.85"/>
    <rect x="43" y="3"  width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="43" y="11" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="43" y="19" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="43" y="27" width="4" height="5" rx="1" fill="#010B16"/>
    <rect x="43" y="35" width="4" height="5" rx="1" fill="#010B16"/>
  </g>

  <!-- Logotype: GrooveMaker -->
  <text x="82" y="36" font-family="'Segoe UI','Inter',Arial,sans-serif"
        font-size="22" font-weight="800" letter-spacing="0.5"
        fill="url(#gm-silver)" filter="url(#gm-text-shadow)">GROOVE</text>
  <text x="82" y="57" font-family="'Segoe UI','Inter',Arial,sans-serif"
        font-size="16" font-weight="700" letter-spacing="3"
        fill="url(#gm-blue)">MAKER</text>

  <!-- Tagline -->
  <text x="82" y="70" font-family="'Segoe UI','Inter',Arial,sans-serif"
        font-size="7.5" font-weight="500" letter-spacing="1.5"
        fill="#4A6080" text-anchor="start">AI IMAGE &amp; VIDEO CREATION</text>

  <!-- Decorative star / spark accents -->
  <circle cx="228" cy="14" r="1.5" fill="#00CFFF" opacity="0.9"/>
  <circle cx="220" cy="10" r="1"   fill="#C0CDD8" opacity="0.7"/>
  <circle cx="232" cy="22" r="1"   fill="#0078D4" opacity="0.8"/>
</svg>
