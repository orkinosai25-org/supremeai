<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Dark space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#050A0E"/>
    </radialGradient>

    <!-- Gold gradient for crown -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Silver gradient for crown body -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="50%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>

    <!-- Crown inner face gradient -->
    <linearGradient id="crownFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A3A"/>
      <stop offset="50%" stop-color="#0D1F30"/>
      <stop offset="100%" stop-color="#071422"/>
    </linearGradient>

    <!-- Diamond/crystal gradient for 'ai' letters -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#A8D8EA" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#E8F4F8" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#B0E0E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>

    <!-- Silver text gradient for SUPREME letters -->
    <linearGradient id="silverTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#D0D0D0"/>
      <stop offset="60%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <!-- Emerald gradient for S -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="30%"  stop-color="#50C878"/>
      <stop offset="60%"  stop-color="#2E8B57"/>
      <stop offset="80%"  stop-color="#1A6B3A"/>
      <stop offset="100%" stop-color="#50C878"/>
    </linearGradient>

    <!-- Glow filter for crown -->
    <filter id="crownGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow filter for emerald S -->
    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#50C878" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Glow filter for diamond ai -->
    <filter id="diamondGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#B0E0E6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Sparkle filter -->
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle star field -->
  <g opacity="0.6">
    <circle cx="50"  cy="40"  r="1.2" fill="white" opacity="0.8"/>
    <circle cx="120" cy="90"  r="0.8" fill="white" opacity="0.6"/>
    <circle cx="200" cy="30"  r="1.0" fill="white" opacity="0.7"/>
    <circle cx="320" cy="60"  r="0.7" fill="white" opacity="0.5"/>
    <circle cx="430" cy="20"  r="1.3" fill="white" opacity="0.9"/>
    <circle cx="510" cy="75"  r="0.9" fill="white" opacity="0.6"/>
    <circle cx="560" cy="35"  r="1.1" fill="white" opacity="0.7"/>
    <circle cx="80"  cy="140" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="480" cy="130" r="1.0" fill="white" opacity="0.6"/>
    <circle cx="540" cy="180" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="30"  cy="700" r="1.0" fill="white" opacity="0.4"/>
    <circle cx="570" cy="720" r="0.9" fill="white" opacity="0.4"/>
    <circle cx="100" cy="760" r="0.7" fill="white" opacity="0.3"/>
    <circle cx="500" cy="780" r="1.1" fill="white" opacity="0.4"/>
  </g>

  <!-- ═══════════════════ CROWN ═══════════════════ -->
  <g transform="translate(300, 200)" filter="url(#crownGlow)">

    <!-- Crown base band -->
    <rect x="-130" y="80" width="260" height="50" rx="8"
          fill="url(#crownFaceGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Base band circuit lines -->
    <line x1="-120" y1="105" x2="-60" y2="105" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <circle cx="-60" cy="105" r="3" fill="#FFD700" opacity="0.7"/>
    <line x1="-60" y1="105" x2="-40" y2="90" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <circle cx="-40" cy="90" r="2" fill="#FFD700" opacity="0.5"/>
    <line x1="60" y1="105" x2="120" y2="105" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <circle cx="60" cy="105" r="3" fill="#FFD700" opacity="0.7"/>
    <line x1="40" y1="90" x2="60" y2="105" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <!-- Diamond gems on band -->
    <polygon points="0,92 8,100 0,108 -8,100" fill="#E8F4F8" stroke="#A8D8EA" stroke-width="1"/>
    <polygon points="-70,95 -63,100 -70,105 -77,100" fill="#E8F4F8" stroke="#A8D8EA" stroke-width="0.8" opacity="0.8"/>
    <polygon points="70,95 77,100 70,105 63,100" fill="#E8F4F8" stroke="#A8D8EA" stroke-width="0.8" opacity="0.8"/>

    <!-- Crown left spike -->
    <path d="M-130,85 L-160,-40 L-100,60 Z"
          fill="url(#crownFaceGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Circuit lines on left spike -->
    <line x1="-143" y1="30" x2="-120" y2="55" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <circle cx="-130" cy="42" r="2" fill="#FFD700" opacity="0.5"/>

    <!-- Crown right spike -->
    <path d="M130,85 L160,-40 L100,60 Z"
          fill="url(#crownFaceGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Circuit lines on right spike -->
    <line x1="120" y1="55" x2="143" y2="30" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <circle cx="130" cy="42" r="2" fill="#FFD700" opacity="0.5"/>

    <!-- Crown center tall spike -->
    <path d="M-50,75 L0,-80 L50,75 Z"
          fill="url(#crownFaceGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Circuit board pattern on center spike -->
    <line x1="0" y1="-60" x2="0" y2="-20" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
    <line x1="-15" y1="-30" x2="15" y2="-30" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <circle cx="-15" cy="-30" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="15"  cy="-30" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="0"   cy="-20" r="3" fill="#FFD700" opacity="0.6"/>
    <!-- Circuit chip symbol -->
    <rect x="-8" y="-18" width="16" height="10" rx="2"
          fill="#0D1B2A" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
    <line x1="-14" y1="-14" x2="-8" y2="-14" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="8"   y1="-14" x2="14" y2="-14" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="-5"  y1="-18" x2="-5" y2="-24" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="5"   y1="-18" x2="5"  y2="-24" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>

    <!-- Gold outer border overlay on spikes -->
    <path d="M-130,85 L-160,-40 L-100,60" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" opacity="0.9"/>
    <path d="M130,85 L160,-40 L100,60"    fill="none" stroke="url(#goldGrad)" stroke-width="3.5" opacity="0.9"/>
    <path d="M-50,75 L0,-80 L50,75"       fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.9"/>

    <!-- Gold glow accent at spike tips -->
    <circle cx="0"   cy="-80" r="6" fill="#FFD700" opacity="0.8" filter="url(#sparkle)"/>
    <circle cx="-160" cy="-40" r="5" fill="#FFD700" opacity="0.7" filter="url(#sparkle)"/>
    <circle cx="160"  cy="-40" r="5" fill="#FFD700" opacity="0.7" filter="url(#sparkle)"/>
  </g>

  <!-- ═══════════════════ "SUPREME" TEXT ═══════════════════ -->
  <!-- Emerald S -->
  <g filter="url(#emeraldGlow)" transform="translate(60, 470)">
    <!-- Emerald faceted S shape -->
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="82" font-weight="bold" fill="url(#emeraldGrad)"
          stroke="#1A6B3A" stroke-width="2">S</text>
    <!-- Facet lines for gem effect -->
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="82" font-weight="bold" fill="none"
          stroke="rgba(127,255,212,0.3)" stroke-width="1">S</text>
  </g>

  <!-- UPREME in silver metallic -->
  <text x="118" y="470" font-family="Georgia, 'Times New Roman', serif"
        font-size="82" font-weight="bold" fill="url(#silverTextGrad)"
        stroke="#808080" stroke-width="1.5" letter-spacing="2">UPREME</text>

  <!-- ═══════════════════ "ai" DIAMOND TEXT ═══════════════════ -->
  <g filter="url(#diamondGlow)" transform="translate(148, 620)">
    <!-- Diamond sparkle small diamond above 'i' dot -->
    <polygon points="155,-10 162,0 155,10 148,0" fill="#E8F4F8" stroke="white" stroke-width="1" opacity="0.9"/>

    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="110" font-weight="bold" fill="url(#diamondGrad)"
          stroke="rgba(255,255,255,0.3)" stroke-width="2" letter-spacing="6">ai</text>
    <!-- Crystal refraction overlay -->
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="110" font-weight="bold" fill="none"
          stroke="rgba(255,255,255,0.15)" stroke-width="1" letter-spacing="6">ai</text>
  </g>

  <!-- Lens flare / light burst for diamond letters -->
  <g transform="translate(300, 620)" opacity="0.7">
    <line x1="0" y1="-30" x2="0"   y2="30"  stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="0" x2="30"  y2="0"   stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="20"  y1="-20" x2="-20" y2="20" stroke="white" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Small orange/gold lens flare dot -->
  <circle cx="370" cy="600" r="5" fill="#FFA500" opacity="0.8" filter="url(#sparkle)"/>
</svg>
