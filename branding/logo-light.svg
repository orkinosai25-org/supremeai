<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="35%"  stop-color="#FFD700"/>
      <stop offset="70%"  stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Silver gradient -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F8F8F8"/>
      <stop offset="40%"  stop-color="#D0D0D0"/>
      <stop offset="70%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>

    <!-- Crown inner fill -->
    <linearGradient id="crownInnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF5CC"/>
      <stop offset="50%"  stop-color="#FFE680"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <!-- Diamond gradient -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#D0ECF5"/>
      <stop offset="60%"  stop-color="#E8F4F8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <!-- Emerald gradient for S -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="25%"  stop-color="#50C878"/>
      <stop offset="60%"  stop-color="#2E8B57"/>
      <stop offset="100%" stop-color="#50C878"/>
    </linearGradient>

    <!-- Rainbow gradient for letter colors -->
    <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E53935"/>
      <stop offset="17%"  stop-color="#FB8C00"/>
      <stop offset="33%"  stop-color="#FDD835"/>
      <stop offset="50%"  stop-color="#43A047"/>
      <stop offset="67%"  stop-color="#1E88E5"/>
      <stop offset="83%"  stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.25)"/>
    </filter>

    <!-- Diamond sparkle filter -->
    <filter id="diamondSparkle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="700" height="400" fill="white"/>

  <!-- ═══════════════════ CROWN ═══════════════════ -->
  <g transform="translate(350, 170)" filter="url(#shadow)">

    <!-- Crown base arc/band -->
    <ellipse cx="0" cy="85" rx="140" ry="22" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="78" rx="140" ry="18" fill="url(#goldGrad)"/>
    <!-- Band highlight -->
    <ellipse cx="0" cy="72" rx="138" ry="16" fill="none" stroke="url(#silverGrad)" stroke-width="4"/>
    <!-- Small diamonds on band -->
    <polygon points="0,68 7,75 0,82 -7,75"   fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="1"/>
    <polygon points="-55,70 -49,76 -55,82 -61,76" fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="0.8"/>
    <polygon points="55,70 61,76 55,82 49,76"  fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="0.8"/>
    <circle cx="-90" cy="76" r="4" fill="url(#silverGrad)"/>
    <circle cx="-75" cy="72" r="3" fill="url(#silverGrad)"/>
    <circle cx="90"  cy="76" r="4" fill="url(#silverGrad)"/>
    <circle cx="75"  cy="72" r="3" fill="url(#silverGrad)"/>

    <!-- Left spike -->
    <path d="M-140,78 L-170,-45 L-95,55 Z" fill="url(#crownInnerGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Left spike shading -->
    <path d="M-140,78 L-170,-45 L-155,-5 Z" fill="rgba(184,134,11,0.3)"/>
    <circle cx="-170" cy="-45" r="7" fill="url(#goldGrad)"/>
    <circle cx="-170" cy="-45" r="4" fill="url(#silverGrad)"/>

    <!-- Right spike -->
    <path d="M140,78 L170,-45 L95,55 Z"  fill="url(#crownInnerGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
    <path d="M140,78 L170,-45 L155,-5 Z" fill="rgba(184,134,11,0.3)"/>
    <circle cx="170" cy="-45" r="7" fill="url(#goldGrad)"/>
    <circle cx="170" cy="-45" r="4" fill="url(#silverGrad)"/>

    <!-- Center tall spike -->
    <path d="M-55,70 L0,-100 L55,70 Z"   fill="url(#crownInnerGrad)" stroke="url(#goldGrad)" stroke-width="3.5"/>
    <path d="M-55,70 L0,-100 L-25,10 Z"  fill="rgba(184,134,11,0.2)"/>
    <!-- Diamond gem at center spike -->
    <polygon points="0,-30 12,-20 0,-10 -12,-20" fill="url(#diamondGrad)" stroke="#AAD0DD" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="0" y2="-10"  stroke="rgba(255,255,255,0.6)" stroke-width="0.8"/>
    <line x1="-12" y1="-20" x2="12" y2="-20" stroke="rgba(255,255,255,0.6)" stroke-width="0.8"/>
    <circle cx="0" cy="-100" r="8" fill="url(#goldGrad)"/>
    <circle cx="0" cy="-100" r="5" fill="url(#silverGrad)"/>

    <!-- Crown fill / body -->
    <path d="M-140,78 L-95,55 L-55,70 L0,-100 L55,70 L95,55 L140,78 L140,85 L-140,85 Z"
          fill="url(#crownInnerGrad)" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Shading on body -->
    <path d="M-140,78 L-95,55 L-55,70 L0,-100 L55,70 L95,55 L140,78"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  </g>

  <!-- ═══════════════════ "SupremeAI" TEXT ═══════════════════ -->
  <!-- Emerald S -->
  <text x="35" y="295"
        font-family="'Trebuchet MS', 'Gill Sans', 'Century Gothic', sans-serif"
        font-size="88" font-weight="bold"
        fill="url(#emeraldGrad)" stroke="#1A6B3A" stroke-width="2.5"
        filter="url(#shadow)">S</text>

  <!-- "upreme" rainbow colored -->
  <text x="98" y="295"
        font-family="'Trebuchet MS', 'Gill Sans', 'Century Gothic', sans-serif"
        font-size="88" font-weight="bold"
        fill="url(#rainbowGrad)"
        filter="url(#shadow)">upreme</text>

  <!-- "AI" diamond/silver -->
  <text x="518" y="295"
        font-family="'Trebuchet MS', 'Gill Sans', 'Century Gothic', sans-serif"
        font-size="88" font-weight="bold"
        fill="url(#diamondGrad)"
        stroke="#A0C8D8" stroke-width="2"
        filter="url(#diamondSparkle)">AI</text>

  <!-- Small diamond sparkle dots on AI -->
  <circle cx="527" cy="215" r="3.5" fill="white" stroke="#A0C8D8" stroke-width="0.8" opacity="0.9"/>
  <circle cx="545" cy="208" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="635" cy="212" r="3"   fill="white" stroke="#A0C8D8" stroke-width="0.8" opacity="0.9"/>
  <circle cx="650" cy="205" r="2"   fill="white" opacity="0.7"/>
</svg>
