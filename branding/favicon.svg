<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="SupremeAI favicon">
  <title>SupremeAI</title>
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fav-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1040;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#fav-bg)" />
  <!-- Crown -->
  <g transform="translate(4, 4)">
    <rect x="1" y="17" width="22" height="4" rx="1" fill="url(#fav-grad)" />
    <polygon points="2,17 2,8 8,13 12,4 16,13 22,8 22,17" fill="url(#fav-grad)" />
    <circle cx="12" cy="5" r="2" fill="#00E5FF" />
  </g>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#050A0E"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="50%"  stop-color="#50C878"/>
      <stop offset="100%" stop-color="#2E8B57"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>
  <!-- Gold ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Mini crown -->
  <g transform="translate(32, 24)">
    <!-- Crown base -->
    <rect x="-12" y="8" width="24" height="6" rx="2" fill="url(#goldGrad)"/>
    <!-- Left spike -->
    <path d="M-12,8 L-16,-4 L-7,5 Z"  fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <!-- Center spike -->
    <path d="M-5,7 L0,-8 L5,7 Z"      fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Right spike -->
    <path d="M12,8 L16,-4 L7,5 Z"     fill="#FFF5CC" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <!-- Diamond gem center -->
    <polygon points="0,-1 3,2 0,5 -3,2" fill="#E8F4F8" stroke="#A8D8EA" stroke-width="0.8"/>
  </g>

  <!-- Emerald S lettermark -->
  <text x="32" y="52"
        font-family="Georgia, serif"
        font-size="22" font-weight="bold"
        fill="url(#emeraldGrad)"
        text-anchor="middle">S</text>
</svg>
