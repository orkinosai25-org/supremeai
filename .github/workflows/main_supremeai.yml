# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - supremeai

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src/SupremeAI.Api

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore
        working-directory: ./src/SupremeAI.Api

      - name: Run tests
        run: |
          # Run any test projects discovered under the repo root; skip if none exist.
          TEST_PROJECTS=$(find "$GITHUB_WORKSPACE" -name "*.Tests.csproj" -o -name "*Tests*.csproj" 2>/dev/null)
          if [ -n "$TEST_PROJECTS" ]; then
            echo "$TEST_PROJECTS" | xargs -I{} dotnet test "{}" --configuration Release --verbosity normal
          else
            echo "No test projects found – skipping test step."
          fi
        working-directory: ./src/SupremeAI.Api

      - name: dotnet publish
        if: github.event_name != 'pull_request'
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"
        working-directory: ./src/SupremeAI.Api

      - name: Upload artifact for deployment job
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'supremeai'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
          