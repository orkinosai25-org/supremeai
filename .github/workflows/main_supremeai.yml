# SupremeAI – Build and Deploy
#
# Triggered on every push/merge to main (or manually).
# This workflow ONLY builds and deploys code — it never re-provisions Azure
# infrastructure.  Use provision-and-deploy.yml (run once or on infra changes)
# to set up Azure resources.
#
# ── Deployment methods (in order of preference) ─────────────────────────────
# 1. OIDC (zero-manual, recommended): run scripts/azure/setup-github-oidc.sh
#    once to configure secrets, then every merge deploys automatically.
# 2. PUBLISH_PROFILE (legacy): download from the Azure Portal and add as a
#    GitHub Secret named PUBLISH_PROFILE.
#
# ── API key injection ────────────────────────────────────────────────────────
# Keys configured as GitHub Secrets are bundled into .env inside the artifact
# and pushed to App Service settings on every deploy so they take effect
# immediately.  Azure-native model secrets (OpenAI, Phi, Llama, Mistral, etc.)
# are managed by provision-and-deploy.yml via Key Vault references.
#
# ── Optional repo variables (Settings → Secrets → Variables) ────────────────
#   AZURE_WEBAPP_NAME    – App Service name     (default: supremeai)
#   AZURE_RESOURCE_GROUP – Resource group name  (default: supremeai-rg)

name: Build and deploy ASP.Net Core app to Azure Web App - supremeai

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token exchange with Azure
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  WEBAPP_NAME:    ${{ vars.AZURE_WEBAPP_NAME   != '' && vars.AZURE_WEBAPP_NAME   || 'supremeai' }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP != '' && vars.AZURE_RESOURCE_GROUP || 'supremeai-rg' }}

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src/SupremeAI.Api

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore
        working-directory: ./src/SupremeAI.Api

      - name: Run tests
        run: |
          # Run any test projects discovered under the repo root; skip if none exist.
          TEST_PROJECTS=$(find "$GITHUB_WORKSPACE" -name "*.Tests.csproj" -o -name "*Tests*.csproj" 2>/dev/null)
          if [ -n "$TEST_PROJECTS" ]; then
            echo "$TEST_PROJECTS" | xargs -I{} dotnet test "{}" --configuration Release --verbosity normal
          else
            echo "No test projects found – skipping test step."
          fi
        working-directory: ./src/SupremeAI.Api

      - name: dotnet publish
        if: github.event_name != 'pull_request'
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp" --nologo
        working-directory: ./src/SupremeAI.Api

      # Bundle any configured GitHub Secret API keys into the .env file inside
      # the publish artifact.  The app reads .env at startup, so keys take effect
      # immediately — even before Key Vault references have resolved on first deploy.
      # All Azure-native keys (OpenAI, Phi, Llama, Mistral, etc.) are provisioned
      # automatically by Bicep and do not need to be set as GitHub Secrets.
      - name: Inject API keys into publish artifact
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GEMINI_API_KEY:    ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          XAI_GROK_API_KEY:         ${{ secrets.XAI_GROK_API_KEY }}
          PHI_35_MINI_ENDPOINT:     ${{ secrets.PHI_35_MINI_ENDPOINT }}
          PHI_35_MINI_API_KEY:      ${{ secrets.PHI_35_MINI_API_KEY }}
          PHI_3_MEDIUM_ENDPOINT:    ${{ secrets.PHI_3_MEDIUM_ENDPOINT }}
          PHI_3_MEDIUM_API_KEY:     ${{ secrets.PHI_3_MEDIUM_API_KEY }}
          LLAMA_31_70B_ENDPOINT:    ${{ secrets.LLAMA_31_70B_ENDPOINT }}
          LLAMA_31_70B_API_KEY:     ${{ secrets.LLAMA_31_70B_API_KEY }}
          MISTRAL_LARGE_ENDPOINT:   ${{ secrets.MISTRAL_LARGE_ENDPOINT }}
          MISTRAL_LARGE_API_KEY:    ${{ secrets.MISTRAL_LARGE_API_KEY }}
          COMMAND_R_PLUS_ENDPOINT:  ${{ secrets.COMMAND_R_PLUS_ENDPOINT }}
          COMMAND_R_PLUS_API_KEY:   ${{ secrets.COMMAND_R_PLUS_API_KEY }}
          JAIS_30B_ENDPOINT:        ${{ secrets.JAIS_30B_ENDPOINT }}
          JAIS_30B_API_KEY:         ${{ secrets.JAIS_30B_API_KEY }}
        run: |
          ENV_FILE="${{ env.DOTNET_ROOT }}/myapp/.env"
          [ -n "$AZURE_OPENAI_ENDPOINT"   ] && printf 'AZURE_OPENAI_ENDPOINT=%s\n'   "$AZURE_OPENAI_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$AZURE_OPENAI_API_KEY"    ] && printf 'AZURE_OPENAI_API_KEY=%s\n'    "$AZURE_OPENAI_API_KEY"    >> "$ENV_FILE"
          [ -n "$OPENAI_API_KEY"          ] && printf 'OPENAI_API_KEY=%s\n'           "$OPENAI_API_KEY"           >> "$ENV_FILE"
          [ -n "$ANTHROPIC_API_KEY"       ] && printf 'ANTHROPIC_API_KEY=%s\n'        "$ANTHROPIC_API_KEY"        >> "$ENV_FILE"
          [ -n "$GOOGLE_GEMINI_API_KEY"   ] && printf 'GOOGLE_GEMINI_API_KEY=%s\n'   "$GOOGLE_GEMINI_API_KEY"   >> "$ENV_FILE"
          [ -n "$XAI_GROK_API_KEY"        ] && printf 'XAI_GROK_API_KEY=%s\n'        "$XAI_GROK_API_KEY"        >> "$ENV_FILE"
          [ -n "$PHI_35_MINI_ENDPOINT"    ] && printf 'PHI_35_MINI_ENDPOINT=%s\n'    "$PHI_35_MINI_ENDPOINT"    >> "$ENV_FILE"
          [ -n "$PHI_35_MINI_API_KEY"     ] && printf 'PHI_35_MINI_API_KEY=%s\n'     "$PHI_35_MINI_API_KEY"     >> "$ENV_FILE"
          [ -n "$PHI_3_MEDIUM_ENDPOINT"   ] && printf 'PHI_3_MEDIUM_ENDPOINT=%s\n'   "$PHI_3_MEDIUM_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$PHI_3_MEDIUM_API_KEY"    ] && printf 'PHI_3_MEDIUM_API_KEY=%s\n'    "$PHI_3_MEDIUM_API_KEY"    >> "$ENV_FILE"
          [ -n "$LLAMA_31_70B_ENDPOINT"   ] && printf 'LLAMA_31_70B_ENDPOINT=%s\n'   "$LLAMA_31_70B_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$LLAMA_31_70B_API_KEY"    ] && printf 'LLAMA_31_70B_API_KEY=%s\n'    "$LLAMA_31_70B_API_KEY"    >> "$ENV_FILE"
          [ -n "$MISTRAL_LARGE_ENDPOINT"  ] && printf 'MISTRAL_LARGE_ENDPOINT=%s\n'  "$MISTRAL_LARGE_ENDPOINT"  >> "$ENV_FILE"
          [ -n "$MISTRAL_LARGE_API_KEY"   ] && printf 'MISTRAL_LARGE_API_KEY=%s\n'   "$MISTRAL_LARGE_API_KEY"   >> "$ENV_FILE"
          [ -n "$COMMAND_R_PLUS_ENDPOINT" ] && printf 'COMMAND_R_PLUS_ENDPOINT=%s\n' "$COMMAND_R_PLUS_ENDPOINT" >> "$ENV_FILE"
          [ -n "$COMMAND_R_PLUS_API_KEY"  ] && printf 'COMMAND_R_PLUS_API_KEY=%s\n'  "$COMMAND_R_PLUS_API_KEY"  >> "$ENV_FILE"
          [ -n "$JAIS_30B_ENDPOINT"       ] && printf 'JAIS_30B_ENDPOINT=%s\n'       "$JAIS_30B_ENDPOINT"       >> "$ENV_FILE"
          [ -n "$JAIS_30B_API_KEY"        ] && printf 'JAIS_30B_API_KEY=%s\n'        "$JAIS_30B_API_KEY"        >> "$ENV_FILE"
          COUNT=$(wc -l < "$ENV_FILE" 2>/dev/null || echo 0)
          echo "Injected ${COUNT} API key(s) into .env"

      - name: Upload artifact for deployment job
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # ── 2. Deploy to Azure Web App ────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # ── Primary: OIDC-based deployment (no PUBLISH_PROFILE needed) ───────────
      - name: Azure Login (OIDC) – primary deployment method
        id: azure_login
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_C7BA4621EF474BBE94974B96CE1B926E || secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_5ECA2F2096BE48BC85762C6ADDA0AB5D || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C54E32D4CA56475EA186436F2EB3641F || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (OIDC – no publish profile required)
        if: steps.azure_login.outcome == 'success'
        id: deploy-oidc
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: .

      # ── Fallback: publish-profile-based deployment ────────────────────────────
      - name: Deploy to Azure Web App (publish profile fallback)
        if: steps.azure_login.outcome != 'success' && secrets.PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ env.WEBAPP_NAME }}
          slot-name:       'Production'
          package:         .
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}

      # Push all AI provider settings that are configured as GitHub Secrets
      # directly to App Service so they take effect immediately after deploy.
      # Azure-native secrets (Phi, Llama, Mistral, etc.) are already configured
      # as Key Vault references by provision-and-deploy.yml.
      - name: Set all AI provider settings on App Service
        if: steps.azure_login.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GEMINI_API_KEY:    ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          XAI_GROK_API_KEY:         ${{ secrets.XAI_GROK_API_KEY }}
          PHI_35_MINI_ENDPOINT:     ${{ secrets.PHI_35_MINI_ENDPOINT }}
          PHI_35_MINI_API_KEY:      ${{ secrets.PHI_35_MINI_API_KEY }}
          PHI_3_MEDIUM_ENDPOINT:    ${{ secrets.PHI_3_MEDIUM_ENDPOINT }}
          PHI_3_MEDIUM_API_KEY:     ${{ secrets.PHI_3_MEDIUM_API_KEY }}
          LLAMA_31_70B_ENDPOINT:    ${{ secrets.LLAMA_31_70B_ENDPOINT }}
          LLAMA_31_70B_API_KEY:     ${{ secrets.LLAMA_31_70B_API_KEY }}
          MISTRAL_LARGE_ENDPOINT:   ${{ secrets.MISTRAL_LARGE_ENDPOINT }}
          MISTRAL_LARGE_API_KEY:    ${{ secrets.MISTRAL_LARGE_API_KEY }}
          COMMAND_R_PLUS_ENDPOINT:  ${{ secrets.COMMAND_R_PLUS_ENDPOINT }}
          COMMAND_R_PLUS_API_KEY:   ${{ secrets.COMMAND_R_PLUS_API_KEY }}
          JAIS_30B_ENDPOINT:        ${{ secrets.JAIS_30B_ENDPOINT }}
          JAIS_30B_API_KEY:         ${{ secrets.JAIS_30B_API_KEY }}
        run: |
          SETTINGS=()
          [ -n "$AZURE_OPENAI_ENDPOINT"   ] && SETTINGS+=("AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT")
          [ -n "$AZURE_OPENAI_API_KEY"    ] && SETTINGS+=("AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY")
          [ -n "$OPENAI_API_KEY"          ] && SETTINGS+=("OPENAI_API_KEY=$OPENAI_API_KEY")
          [ -n "$ANTHROPIC_API_KEY"       ] && SETTINGS+=("ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY")
          [ -n "$GOOGLE_GEMINI_API_KEY"   ] && SETTINGS+=("GOOGLE_GEMINI_API_KEY=$GOOGLE_GEMINI_API_KEY")
          [ -n "$XAI_GROK_API_KEY"        ] && SETTINGS+=("XAI_GROK_API_KEY=$XAI_GROK_API_KEY")
          [ -n "$PHI_35_MINI_ENDPOINT"    ] && SETTINGS+=("PHI_35_MINI_ENDPOINT=$PHI_35_MINI_ENDPOINT")
          [ -n "$PHI_35_MINI_API_KEY"     ] && SETTINGS+=("PHI_35_MINI_API_KEY=$PHI_35_MINI_API_KEY")
          [ -n "$PHI_3_MEDIUM_ENDPOINT"   ] && SETTINGS+=("PHI_3_MEDIUM_ENDPOINT=$PHI_3_MEDIUM_ENDPOINT")
          [ -n "$PHI_3_MEDIUM_API_KEY"    ] && SETTINGS+=("PHI_3_MEDIUM_API_KEY=$PHI_3_MEDIUM_API_KEY")
          [ -n "$LLAMA_31_70B_ENDPOINT"   ] && SETTINGS+=("LLAMA_31_70B_ENDPOINT=$LLAMA_31_70B_ENDPOINT")
          [ -n "$LLAMA_31_70B_API_KEY"    ] && SETTINGS+=("LLAMA_31_70B_API_KEY=$LLAMA_31_70B_API_KEY")
          [ -n "$MISTRAL_LARGE_ENDPOINT"  ] && SETTINGS+=("MISTRAL_LARGE_ENDPOINT=$MISTRAL_LARGE_ENDPOINT")
          [ -n "$MISTRAL_LARGE_API_KEY"   ] && SETTINGS+=("MISTRAL_LARGE_API_KEY=$MISTRAL_LARGE_API_KEY")
          [ -n "$COMMAND_R_PLUS_ENDPOINT" ] && SETTINGS+=("COMMAND_R_PLUS_ENDPOINT=$COMMAND_R_PLUS_ENDPOINT")
          [ -n "$COMMAND_R_PLUS_API_KEY"  ] && SETTINGS+=("COMMAND_R_PLUS_API_KEY=$COMMAND_R_PLUS_API_KEY")
          [ -n "$JAIS_30B_ENDPOINT"       ] && SETTINGS+=("JAIS_30B_ENDPOINT=$JAIS_30B_ENDPOINT")
          [ -n "$JAIS_30B_API_KEY"        ] && SETTINGS+=("JAIS_30B_API_KEY=$JAIS_30B_API_KEY")

          if [ ${#SETTINGS[@]} -gt 0 ]; then
            az webapp config appsettings set \
              --name           "$WEBAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --settings       "${SETTINGS[@]}" \
              --output         none
            echo "✅ Updated ${#SETTINGS[@]} App Service setting(s)."
          else
            echo "⚠ No additional API key secrets are configured as GitHub Secrets."
            echo "  Azure-native model settings are configured via Bicep Key Vault references."
          fi
          