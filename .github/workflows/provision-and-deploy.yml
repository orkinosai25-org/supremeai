# SupremeAI – Provision and Deploy
#
# Triggered on every push/merge to main (or manually).
# Fully provisions Azure infrastructure and deploys the backend API
# so that no manual commands are ever needed after a PR is merged.
#
# ── Zero-manual-setup path (recommended) ───────────────────────────────────────
# Run scripts/azure/setup-github-oidc.sh once from your local machine to:
#   • Create an Azure service principal with Contributor role
#   • Configure OIDC Workload Identity Federation for this repository
#   • Automatically set AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#     as GitHub repository secrets using the GitHub CLI
# After that, every push to main provisions all Azure resources and deploys
# the app automatically — no manual Portal steps, no PUBLISH_PROFILE needed.
#
# Required secrets (set automatically by setup-github-oidc.sh):
#   AZURE_CLIENT_ID       – Service-principal client ID (OIDC)
#   AZURE_TENANT_ID       – Azure Active Directory tenant ID
#   AZURE_SUBSCRIPTION_ID – Azure subscription ID
#
# Optional – external AI provider keys (add once to GitHub Secrets; stored in
# Key Vault by the workflow so App Service reads them via Key Vault references):
#   ANTHROPIC_API_KEY     – Anthropic Claude API key (https://console.anthropic.com)
#   GOOGLE_GEMINI_API_KEY – Google Gemini API key    (https://aistudio.google.com)
#   XAI_GROK_API_KEY      – xAI Grok API key         (https://console.x.ai)
#   AZURE_OPENAI_ENDPOINT – Pre-existing Azure OpenAI endpoint (optional override)
#   AZURE_OPENAI_API_KEY  – Pre-existing Azure OpenAI API key  (optional override)
#   OPENAI_API_KEY        – Direct OpenAI API key              (optional, future use)
#
# Note: Azure OpenAI and Azure AI Foundry model secrets (Phi, Llama, Mistral, etc.)
# are provisioned automatically by the Bicep templates and stored in Key Vault.
# App Service reads all secrets via Key Vault references in its application settings.
#
# Legacy fallback: PUBLISH_PROFILE secret is still supported for deployments to a
# pre-existing App Service without OIDC credentials, but is no longer required.
#
# Optional repository variables (Settings → Secrets and variables → Variables):
#   AZURE_RESOURCE_GROUP  – Resource group name          (default: supremeai-rg)
#   AZURE_LOCATION        – Azure region                 (default: eastus)
#   AZURE_BASE_NAME       – Base name for all resources  (default: supremeai)
#   AZURE_WEBAPP_NAME     – Azure Web App name           (default: supremeai)

name: Provision and Deploy SupremeAI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_provisioning:
        description: 'Skip Azure infrastructure provisioning (useful for code-only changes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  id-token: write   # Required for OIDC token exchange with Azure
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP != '' && vars.AZURE_RESOURCE_GROUP || 'supremeai-rg' }}
  LOCATION:       ${{ vars.AZURE_LOCATION      != '' && vars.AZURE_LOCATION      || 'eastus' }}
  BASE_NAME:      ${{ vars.AZURE_BASE_NAME     != '' && vars.AZURE_BASE_NAME     || 'supremeai' }}
  WEBAPP_NAME:    ${{ vars.AZURE_WEBAPP_NAME   != '' && vars.AZURE_WEBAPP_NAME   || 'supremeai' }}

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Validate required secrets before spending any cloud minutes ───────────
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    outputs:
      has_publish_profile: ${{ steps.check.outputs.has_publish_profile }}
      has_oidc_creds:      ${{ steps.check.outputs.has_oidc_creds }}
    steps:
      - name: Check required Azure secrets
        id: check
        shell: bash
        # Pass secret presence as plain booleans via env vars.
        # NEVER inline ${{ secrets.X }} directly into a bash [[ ]] expression –
        # secrets with XML/special chars (like PUBLISH_PROFILE) cause syntax errors.
        env:
          AZURE_CLIENT_ID_SET:       ${{ secrets.AZURE_CLIENT_ID != '' }}
          AZURE_TENANT_ID_SET:       ${{ secrets.AZURE_TENANT_ID != '' }}
          AZURE_SUBSCRIPTION_ID_SET: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}
          PUBLISH_PROFILE_SET:       ${{ secrets.PUBLISH_PROFILE != '' }}
          AZURE_OPENAI_ENDPOINT_SET: ${{ secrets.AZURE_OPENAI_ENDPOINT != '' }}
          AZURE_OPENAI_API_KEY_SET:  ${{ secrets.AZURE_OPENAI_API_KEY != '' }}
          OPENAI_API_KEY_SET:        ${{ secrets.OPENAI_API_KEY != '' }}
          ANTHROPIC_API_KEY_SET:     ${{ secrets.ANTHROPIC_API_KEY != '' }}
          GOOGLE_GEMINI_API_KEY_SET: ${{ secrets.GOOGLE_GEMINI_API_KEY != '' }}
          XAI_GROK_API_KEY_SET:      ${{ secrets.XAI_GROK_API_KEY != '' }}
        run: |
          OIDC_MISSING=()

          [[ "$AZURE_CLIENT_ID_SET"       != "true" ]] && OIDC_MISSING+=("AZURE_CLIENT_ID")
          [[ "$AZURE_TENANT_ID_SET"       != "true" ]] && OIDC_MISSING+=("AZURE_TENANT_ID")
          [[ "$AZURE_SUBSCRIPTION_ID_SET" != "true" ]] && OIDC_MISSING+=("AZURE_SUBSCRIPTION_ID")

          if [[ ${#OIDC_MISSING[@]} -eq 0 ]]; then
            echo "has_oidc_creds=true" >> "$GITHUB_OUTPUT"
            echo "✅ All OIDC provisioning secrets are present – infrastructure provisioning and deployment will run."
          else
            echo "has_oidc_creds=false" >> "$GITHUB_OUTPUT"
            if [[ "$PUBLISH_PROFILE_SET" == "true" ]]; then
              echo "::warning::OIDC secrets are not configured – infrastructure provisioning will be skipped."
              echo "  Missing OIDC secrets:"
              for secret in "${OIDC_MISSING[@]}"; do
                echo "  ⚠  $secret is not set"
              done
              echo ""
              echo "  PUBLISH_PROFILE is set, so deployment will proceed using the publish profile."
              echo "  To enable zero-manual-setup provisioning and deployment, run:"
              echo "  scripts/azure/setup-github-oidc.sh --repo ${{ github.repository }}"
            else
              echo "::error title=Missing Required Secrets::Neither OIDC secrets nor PUBLISH_PROFILE are configured."
              echo ""
              echo "  Run the one-time OIDC setup script to configure everything automatically:"
              echo "  scripts/azure/setup-github-oidc.sh --repo ${{ github.repository }}"
              echo ""
              echo "  Or, to provision and deploy manually, add OIDC secrets at:"
              echo "  Repository → Settings → Secrets and variables → Actions → Secrets"
              echo ""
              for secret in "${OIDC_MISSING[@]}"; do
                echo "::error::  ✗ $secret is not set"
              done
              echo ""
              echo "  Alternatively, add PUBLISH_PROFILE to deploy to an already-provisioned Web App."
              exit 1
            fi
          fi

          # PUBLISH_PROFILE is a legacy fallback — not required when OIDC creds are present.
          # When OIDC is configured, deployment uses OIDC token-based auth automatically.
          if [[ "$PUBLISH_PROFILE_SET" == "true" ]]; then
            echo "has_publish_profile=true"  >> "$GITHUB_OUTPUT"
            echo "  ✓ PUBLISH_PROFILE is set – available as a legacy deployment fallback."
          else
            echo "has_publish_profile=false" >> "$GITHUB_OUTPUT"
            if [[ ${#OIDC_MISSING[@]} -eq 0 ]]; then
              echo "  PUBLISH_PROFILE is not set – deployment will use OIDC credentials (no publish profile needed)."
            else
              echo "::warning::PUBLISH_PROFILE is not set and OIDC creds are missing – deployment will be skipped."
              echo "  Run scripts/azure/setup-github-oidc.sh to configure OIDC and enable automated deployment."
            fi
          fi

          # Warn (non-fatal) about optional external API key secrets
          OPTIONAL_MISSING=()
          [[ "$AZURE_OPENAI_ENDPOINT_SET" != "true" ]] && OPTIONAL_MISSING+=("AZURE_OPENAI_ENDPOINT")
          [[ "$AZURE_OPENAI_API_KEY_SET"  != "true" ]] && OPTIONAL_MISSING+=("AZURE_OPENAI_API_KEY")
          [[ "$OPENAI_API_KEY_SET"        != "true" ]] && OPTIONAL_MISSING+=("OPENAI_API_KEY")
          [[ "$ANTHROPIC_API_KEY_SET"     != "true" ]] && OPTIONAL_MISSING+=("ANTHROPIC_API_KEY")
          [[ "$GOOGLE_GEMINI_API_KEY_SET" != "true" ]] && OPTIONAL_MISSING+=("GOOGLE_GEMINI_API_KEY")
          [[ "$XAI_GROK_API_KEY_SET"      != "true" ]] && OPTIONAL_MISSING+=("XAI_GROK_API_KEY")

          if [[ ${#OPTIONAL_MISSING[@]} -gt 0 ]]; then
            echo ""
            echo "⚠️  Optional external API-key secrets are not set – those providers will return error responses:"
            for secret in "${OPTIONAL_MISSING[@]}"; do
              echo "  ⚠  $secret"
            done
            echo ""
            echo "  Add these as GitHub repository secrets to enable the corresponding AI providers."
            echo "  Azure OpenAI and all Azure AI Foundry models (Phi, Llama, Mistral, etc.) are"
            echo "  provisioned automatically by Bicep – no manual key management needed for those."
          fi

  # ── 2. Detect whether infrastructure files changed ───────────────────────────
  # Provisioning is expensive and idempotent, but re-running Bicep on every
  # code push is wasteful.  This job checks whether any Bicep templates or
  # Azure setup scripts changed in the current commit.  The provision job uses
  # this output (combined with manual workflow_dispatch) to decide whether to
  # run.  On a branch's first push (no parent commit), we conservatively treat
  # infra as changed so that provisioning always runs on initial setup.
  check-infra-changes:
    name: Check for infra file changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 2 fetches the current commit and its parent so that
          # git diff HEAD~1 HEAD can compare the two commits to detect changes.
          fetch-depth: 2

      - name: Detect Bicep / Azure-scripts changes
        id: diff
        shell: bash
        run: |
          # On a fresh branch the parent commit may not exist; treat that as changed.
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No parent commit – treating infra as changed (initial setup)."
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD | \
            grep -E '(scripts/azure/|\.bicep$)' | wc -l)
          if [[ "$CHANGED" -gt 0 ]]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Infra files changed ($CHANGED file(s)) – provisioning will run."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No infra files changed – provisioning skipped for this push."
          fi

  # ── 3. Provision Azure infrastructure ────────────────────────────────────────
  provision:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    needs: [validate-secrets, check-infra-changes]
    # continue-on-error ensures a broken OIDC configuration does not mark the
    # entire workflow as failed when PUBLISH_PROFILE-based deployment can still
    # proceed.  The actual outcome is captured in the `succeeded` output so that
    # the summary job can report it accurately.
    continue-on-error: true
    if: |
      github.event.inputs.skip_provisioning != 'true' &&
      needs.validate-secrets.outputs.has_oidc_creds == 'true' &&
      (github.event_name == 'workflow_dispatch' || needs.check-infra-changes.outputs.changed == 'true')
    outputs:
      key_vault_name: ${{ steps.deploy.outputs.keyVaultName }}
      key_vault_uri:  ${{ steps.deploy.outputs.keyVaultUri }}
      openai_endpoint: ${{ steps.deploy.outputs.openAiEndpoint }}
      web_app_url:     ${{ steps.deploy.outputs.webAppUrl }}
      succeeded:       ${{ steps.outcome.outputs.succeeded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register required Azure resource providers
        shell: bash
        run: |
          PROVIDERS=(
            Microsoft.CognitiveServices
            Microsoft.MachineLearningServices
            Microsoft.KeyVault
            Microsoft.Storage
            Microsoft.Web
          )
          for provider in "${PROVIDERS[@]}"; do
            STATE=$(az provider show --namespace "$provider" \
              --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")
            if [[ "$STATE" != "Registered" ]]; then
              echo "  Registering $provider ..."
              az provider register --namespace "$provider" --wait
            else
              echo "  $provider – already registered"
            fi
          done

      - name: Create resource group
        shell: bash
        run: |
          az group create \
            --name     "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --tags     project=SupremeAI environment=production \
            --output   none
          echo "Resource group '$RESOURCE_GROUP' is ready in '$LOCATION'."

      - name: Deploy Bicep infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template:          scripts/azure/main.bicep
          parameters: >
            baseName=${{ env.BASE_NAME }}
            location=${{ env.LOCATION }}
            webAppName=${{ env.WEBAPP_NAME }}
          deploymentName: supremeai-${{ github.run_number }}
          failOnStdErr: false

      - name: Store external AI provider keys in Key Vault
        shell: bash
        run: |
          KV_NAME="${{ steps.deploy.outputs.keyVaultName }}"
          if [[ -z "$KV_NAME" ]]; then
            echo "⚠ Key Vault name not returned from deployment – skipping secret storage."
            exit 0
          fi
          echo "Storing API keys in Key Vault '$KV_NAME' ..."

          # The CI service principal needs Key Vault Secrets Officer role to write secrets.
          # Attempt to self-assign the role (requires Owner or User Access Administrator on
          # the resource group). If that fails, the admin must pre-grant the role.
          KV_ID=$(az keyvault show --name "$KV_NAME" --query id --output tsv)
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" \
            --query id --output tsv 2>/dev/null || echo "")

          if [[ -n "$SP_OBJECT_ID" ]]; then
            az role assignment create \
              --role               "Key Vault Secrets Officer" \
              --assignee-object-id "$SP_OBJECT_ID" \
              --assignee-principal-type ServicePrincipal \
              --scope              "$KV_ID" \
              --output             none 2>/dev/null \
            && echo "  ✓ Key Vault Secrets Officer role granted to CI service principal." \
            || echo "  – Role already exists or insufficient permissions to self-assign (non-fatal)."
          fi

          store_secret() {
            local name="$1" value="$2"
            if [[ -n "$value" ]]; then
              if az keyvault secret set \
                   --vault-name "$KV_NAME" \
                   --name       "$name" \
                   --value      "$value" \
                   --output     none 2>/dev/null; then
                echo "  ✓ $name stored"
              else
                echo "  ⚠ Could not store $name – ensure the CI service principal has"
                echo "    'Key Vault Secrets Officer' role on vault '$KV_NAME'."
              fi
            else
              echo "  – $name not provided (that provider will return an error response until the key is configured)"
            fi
          }

          store_secret "azure-openai-endpoint"  "${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          store_secret "azure-openai-api-key"   "${{ secrets.AZURE_OPENAI_API_KEY }}"
          store_secret "openai-api-key"          "${{ secrets.OPENAI_API_KEY }}"
          store_secret "anthropic-api-key"       "${{ secrets.ANTHROPIC_API_KEY }}"
          store_secret "google-gemini-api-key"   "${{ secrets.GOOGLE_GEMINI_API_KEY }}"
          store_secret "xai-grok-api-key"        "${{ secrets.XAI_GROK_API_KEY }}"

      - name: Capture provision outcome
        if: always()
        id: outcome
        shell: bash
        run: |
          # Only report succeeded=true when the Bicep deploy step actually ran and
          # completed successfully.  Any other outcome (failure OR skipped – which
          # happens when Azure Login failed earlier) means provisioning did not
          # complete and should be treated as not-succeeded.
          if [[ "${{ steps.deploy.outcome }}" == "success" ]]; then
            echo "succeeded=true"  >> "$GITHUB_OUTPUT"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 3. Build the backend API ──────────────────────────────────────────────────
  build:
    name: Build SupremeAI Backend API
    runs-on: ubuntu-latest
    needs: validate-secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/SupremeAI.Api/SupremeAI.Api.csproj

      - name: Build
        run: |
          dotnet build src/SupremeAI.Api/SupremeAI.Api.csproj \
            --configuration Release \
            --no-restore \
            --nologo

      - name: Publish (framework-dependent deployment package)
        run: |
          dotnet publish src/SupremeAI.Api/SupremeAI.Api.csproj \
            --configuration Release \
            --no-build \
            --output       ./publish \
            --nologo

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:            supremeai-api
          path:            ./publish
          retention-days:  1

  # ── 4. Deploy API to Azure Web App ────────────────────────────────────────────
  deploy:
    name: Deploy API to Azure Web App
    runs-on: ubuntu-latest
    needs: [validate-secrets, provision, build]
    # Run when build succeeded AND either:
    #   - OIDC creds are configured (primary, zero-manual-setup path), OR
    #   - PUBLISH_PROFILE is configured (legacy fallback for pre-existing App Service)
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.provision.result == 'success' || needs.provision.result == 'skipped' || needs.provision.result == 'failure') &&
      (needs.validate-secrets.outputs.has_oidc_creds == 'true' || needs.validate-secrets.outputs.has_publish_profile == 'true')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: supremeai-api
          path: ./publish

      # Inject API keys from GitHub secrets into a .env file that the app
      # loads at startup.  This is a fallback for when Key Vault references
      # have not yet resolved (e.g. first deploy, or OIDC provisioning skipped).
      # Only non-empty secrets are written so the file never contains placeholders.
      # Azure-native model credentials (OpenAI, Phi, Llama, Mistral, etc.) are
      # provisioned by Bicep into Key Vault — listed here as GitHub Secret fallbacks.
      - name: Inject API keys into publish artifact
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GEMINI_API_KEY:    ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          XAI_GROK_API_KEY:         ${{ secrets.XAI_GROK_API_KEY }}
          PHI_35_MINI_ENDPOINT:     ${{ secrets.PHI_35_MINI_ENDPOINT }}
          PHI_35_MINI_API_KEY:      ${{ secrets.PHI_35_MINI_API_KEY }}
          PHI_3_MEDIUM_ENDPOINT:    ${{ secrets.PHI_3_MEDIUM_ENDPOINT }}
          PHI_3_MEDIUM_API_KEY:     ${{ secrets.PHI_3_MEDIUM_API_KEY }}
          LLAMA_31_70B_ENDPOINT:    ${{ secrets.LLAMA_31_70B_ENDPOINT }}
          LLAMA_31_70B_API_KEY:     ${{ secrets.LLAMA_31_70B_API_KEY }}
          MISTRAL_LARGE_ENDPOINT:   ${{ secrets.MISTRAL_LARGE_ENDPOINT }}
          MISTRAL_LARGE_API_KEY:    ${{ secrets.MISTRAL_LARGE_API_KEY }}
          COMMAND_R_PLUS_ENDPOINT:  ${{ secrets.COMMAND_R_PLUS_ENDPOINT }}
          COMMAND_R_PLUS_API_KEY:   ${{ secrets.COMMAND_R_PLUS_API_KEY }}
          JAIS_30B_ENDPOINT:        ${{ secrets.JAIS_30B_ENDPOINT }}
          JAIS_30B_API_KEY:         ${{ secrets.JAIS_30B_API_KEY }}
        run: |
          ENV_FILE="./publish/.env"
          [ -n "$AZURE_OPENAI_ENDPOINT"   ] && printf 'AZURE_OPENAI_ENDPOINT=%s\n'   "$AZURE_OPENAI_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$AZURE_OPENAI_API_KEY"    ] && printf 'AZURE_OPENAI_API_KEY=%s\n'    "$AZURE_OPENAI_API_KEY"    >> "$ENV_FILE"
          [ -n "$OPENAI_API_KEY"          ] && printf 'OPENAI_API_KEY=%s\n'           "$OPENAI_API_KEY"           >> "$ENV_FILE"
          [ -n "$ANTHROPIC_API_KEY"       ] && printf 'ANTHROPIC_API_KEY=%s\n'        "$ANTHROPIC_API_KEY"        >> "$ENV_FILE"
          [ -n "$GOOGLE_GEMINI_API_KEY"   ] && printf 'GOOGLE_GEMINI_API_KEY=%s\n'   "$GOOGLE_GEMINI_API_KEY"   >> "$ENV_FILE"
          [ -n "$XAI_GROK_API_KEY"        ] && printf 'XAI_GROK_API_KEY=%s\n'        "$XAI_GROK_API_KEY"        >> "$ENV_FILE"
          [ -n "$PHI_35_MINI_ENDPOINT"    ] && printf 'PHI_35_MINI_ENDPOINT=%s\n'    "$PHI_35_MINI_ENDPOINT"    >> "$ENV_FILE"
          [ -n "$PHI_35_MINI_API_KEY"     ] && printf 'PHI_35_MINI_API_KEY=%s\n'     "$PHI_35_MINI_API_KEY"     >> "$ENV_FILE"
          [ -n "$PHI_3_MEDIUM_ENDPOINT"   ] && printf 'PHI_3_MEDIUM_ENDPOINT=%s\n'   "$PHI_3_MEDIUM_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$PHI_3_MEDIUM_API_KEY"    ] && printf 'PHI_3_MEDIUM_API_KEY=%s\n'    "$PHI_3_MEDIUM_API_KEY"    >> "$ENV_FILE"
          [ -n "$LLAMA_31_70B_ENDPOINT"   ] && printf 'LLAMA_31_70B_ENDPOINT=%s\n'   "$LLAMA_31_70B_ENDPOINT"   >> "$ENV_FILE"
          [ -n "$LLAMA_31_70B_API_KEY"    ] && printf 'LLAMA_31_70B_API_KEY=%s\n'    "$LLAMA_31_70B_API_KEY"    >> "$ENV_FILE"
          [ -n "$MISTRAL_LARGE_ENDPOINT"  ] && printf 'MISTRAL_LARGE_ENDPOINT=%s\n'  "$MISTRAL_LARGE_ENDPOINT"  >> "$ENV_FILE"
          [ -n "$MISTRAL_LARGE_API_KEY"   ] && printf 'MISTRAL_LARGE_API_KEY=%s\n'   "$MISTRAL_LARGE_API_KEY"   >> "$ENV_FILE"
          [ -n "$COMMAND_R_PLUS_ENDPOINT" ] && printf 'COMMAND_R_PLUS_ENDPOINT=%s\n' "$COMMAND_R_PLUS_ENDPOINT" >> "$ENV_FILE"
          [ -n "$COMMAND_R_PLUS_API_KEY"  ] && printf 'COMMAND_R_PLUS_API_KEY=%s\n'  "$COMMAND_R_PLUS_API_KEY"  >> "$ENV_FILE"
          [ -n "$JAIS_30B_ENDPOINT"       ] && printf 'JAIS_30B_ENDPOINT=%s\n'       "$JAIS_30B_ENDPOINT"       >> "$ENV_FILE"
          [ -n "$JAIS_30B_API_KEY"        ] && printf 'JAIS_30B_API_KEY=%s\n'        "$JAIS_30B_API_KEY"        >> "$ENV_FILE"
          COUNT=$(wc -l < "$ENV_FILE" 2>/dev/null || echo 0)
          echo "Injected ${COUNT} API key(s) into .env"

      # ── Primary: OIDC-based deployment (no PUBLISH_PROFILE needed) ───────────
      # azure/webapps-deploy@v3 uses the current Azure login context when
      # publish-profile is not provided — this is the recommended zero-manual path.
      - name: Azure Login (OIDC) – primary deployment method
        id: deploy_azure_login
        if: needs.validate-secrets.outputs.has_oidc_creds == 'true'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy package to Azure Web App (OIDC – no publish profile required)
        if: steps.deploy_azure_login.outcome == 'success'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package:  ./publish

      # ── Fallback: publish-profile-based deployment ────────────────────────────
      # Used when OIDC creds are not configured (e.g. third-party CI, legacy setup).
      - name: Deploy package to Azure Web App (publish profile fallback)
        if: steps.deploy_azure_login.outcome != 'success' && needs.validate-secrets.outputs.has_publish_profile == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ env.WEBAPP_NAME }}
          package:         ./publish
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}

      # After deploying, push any GitHub-secret API keys directly to App Service
      # configuration so they take effect immediately (Key Vault references may
      # take a few minutes to propagate on first deploy).
      # Azure AI Foundry vars (Phi, Llama, Mistral, etc.) are listed here too
      # so they can be set from GitHub Secrets when Bicep provisioning is skipped.
      - name: Set all AI provider settings on App Service
        if: steps.deploy_azure_login.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GEMINI_API_KEY:    ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          XAI_GROK_API_KEY:         ${{ secrets.XAI_GROK_API_KEY }}
          PHI_35_MINI_ENDPOINT:     ${{ secrets.PHI_35_MINI_ENDPOINT }}
          PHI_35_MINI_API_KEY:      ${{ secrets.PHI_35_MINI_API_KEY }}
          PHI_3_MEDIUM_ENDPOINT:    ${{ secrets.PHI_3_MEDIUM_ENDPOINT }}
          PHI_3_MEDIUM_API_KEY:     ${{ secrets.PHI_3_MEDIUM_API_KEY }}
          LLAMA_31_70B_ENDPOINT:    ${{ secrets.LLAMA_31_70B_ENDPOINT }}
          LLAMA_31_70B_API_KEY:     ${{ secrets.LLAMA_31_70B_API_KEY }}
          MISTRAL_LARGE_ENDPOINT:   ${{ secrets.MISTRAL_LARGE_ENDPOINT }}
          MISTRAL_LARGE_API_KEY:    ${{ secrets.MISTRAL_LARGE_API_KEY }}
          COMMAND_R_PLUS_ENDPOINT:  ${{ secrets.COMMAND_R_PLUS_ENDPOINT }}
          COMMAND_R_PLUS_API_KEY:   ${{ secrets.COMMAND_R_PLUS_API_KEY }}
          JAIS_30B_ENDPOINT:        ${{ secrets.JAIS_30B_ENDPOINT }}
          JAIS_30B_API_KEY:         ${{ secrets.JAIS_30B_API_KEY }}
        run: |
          SETTINGS=()
          [ -n "$AZURE_OPENAI_ENDPOINT"   ] && SETTINGS+=("AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT")
          [ -n "$AZURE_OPENAI_API_KEY"    ] && SETTINGS+=("AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY")
          [ -n "$OPENAI_API_KEY"          ] && SETTINGS+=("OPENAI_API_KEY=$OPENAI_API_KEY")
          [ -n "$ANTHROPIC_API_KEY"       ] && SETTINGS+=("ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY")
          [ -n "$GOOGLE_GEMINI_API_KEY"   ] && SETTINGS+=("GOOGLE_GEMINI_API_KEY=$GOOGLE_GEMINI_API_KEY")
          [ -n "$XAI_GROK_API_KEY"        ] && SETTINGS+=("XAI_GROK_API_KEY=$XAI_GROK_API_KEY")
          [ -n "$PHI_35_MINI_ENDPOINT"    ] && SETTINGS+=("PHI_35_MINI_ENDPOINT=$PHI_35_MINI_ENDPOINT")
          [ -n "$PHI_35_MINI_API_KEY"     ] && SETTINGS+=("PHI_35_MINI_API_KEY=$PHI_35_MINI_API_KEY")
          [ -n "$PHI_3_MEDIUM_ENDPOINT"   ] && SETTINGS+=("PHI_3_MEDIUM_ENDPOINT=$PHI_3_MEDIUM_ENDPOINT")
          [ -n "$PHI_3_MEDIUM_API_KEY"    ] && SETTINGS+=("PHI_3_MEDIUM_API_KEY=$PHI_3_MEDIUM_API_KEY")
          [ -n "$LLAMA_31_70B_ENDPOINT"   ] && SETTINGS+=("LLAMA_31_70B_ENDPOINT=$LLAMA_31_70B_ENDPOINT")
          [ -n "$LLAMA_31_70B_API_KEY"    ] && SETTINGS+=("LLAMA_31_70B_API_KEY=$LLAMA_31_70B_API_KEY")
          [ -n "$MISTRAL_LARGE_ENDPOINT"  ] && SETTINGS+=("MISTRAL_LARGE_ENDPOINT=$MISTRAL_LARGE_ENDPOINT")
          [ -n "$MISTRAL_LARGE_API_KEY"   ] && SETTINGS+=("MISTRAL_LARGE_API_KEY=$MISTRAL_LARGE_API_KEY")
          [ -n "$COMMAND_R_PLUS_ENDPOINT" ] && SETTINGS+=("COMMAND_R_PLUS_ENDPOINT=$COMMAND_R_PLUS_ENDPOINT")
          [ -n "$COMMAND_R_PLUS_API_KEY"  ] && SETTINGS+=("COMMAND_R_PLUS_API_KEY=$COMMAND_R_PLUS_API_KEY")
          [ -n "$JAIS_30B_ENDPOINT"       ] && SETTINGS+=("JAIS_30B_ENDPOINT=$JAIS_30B_ENDPOINT")
          [ -n "$JAIS_30B_API_KEY"        ] && SETTINGS+=("JAIS_30B_API_KEY=$JAIS_30B_API_KEY")

          if [ ${#SETTINGS[@]} -gt 0 ]; then
            az webapp config appsettings set \
              --name           "$WEBAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --settings       "${SETTINGS[@]}" \
              --output         none
            echo "✅ Updated ${#SETTINGS[@]} App Service setting(s)."
          else
            echo "⚠ No additional API key secrets configured as GitHub Secrets."
            echo "  Azure-native model settings are configured via Bicep Key Vault references."
          fi

      - name: Health check – wait for API to respond
        shell: bash
        run: |
          API_URL="https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/ai/models"
          echo "Polling API health endpoint: $API_URL"

          for i in $(seq 1 20); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL" || echo "000")
            if [[ "$HTTP_STATUS" == "200" ]]; then
              echo "✅ API is live and responding (attempt $i, HTTP $HTTP_STATUS)."
              exit 0
            fi
            echo "  Attempt $i/20: HTTP $HTTP_STATUS – waiting 15 s ..."
            sleep 15
          done

          echo "::warning::API health check timed out after 20 attempts (~5 minutes). The app may still be starting up."

  # ── 5. Deployment summary ─────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [validate-secrets, check-infra-changes, provision, build, deploy]
    if: always()

    steps:
      - name: Print deployment summary
        shell: bash
        run: |
          # With continue-on-error on the provision job, needs.provision.result is
          # always 'success' or 'skipped'.  Use the explicit `succeeded` output
          # captured inside the provision job to report the real outcome.
          if [[ "${{ needs.provision.result }}" == "skipped" ]]; then
            PROV_STATUS="skipped"
          elif [[ "${{ needs.provision.outputs.succeeded }}" == "true" ]]; then
            PROV_STATUS="success"
          elif [[ "${{ needs.provision.result }}" == "success" ]]; then
            # continue-on-error masked a real failure (succeeded output is false/absent)
            PROV_STATUS="failure"
          else
            PROV_STATUS="${{ needs.provision.result }}"
          fi
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          icon() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭ " ;;
              failure) echo "❌" ;;
              *)       echo "❓" ;;
            esac
          }

          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         SupremeAI – Deployment Summary               ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Run     : #${{ github.run_number }}"
          echo ""
          echo "  $(icon "$PROV_STATUS")  Provision : $PROV_STATUS"
          echo "  $(icon "$BUILD_STATUS") Build     : $BUILD_STATUS"
          echo "  $(icon "$DEPLOY_STATUS") Deploy    : $DEPLOY_STATUS"
          echo ""

          KV_URI="${{ needs.provision.outputs.key_vault_uri }}"
          OAI_ENDPOINT="${{ needs.provision.outputs.openai_endpoint }}"
          WEB_APP_URL="${{ needs.provision.outputs.web_app_url }}"
          WEBAPP_URL="${WEB_APP_URL:-https://${{ env.WEBAPP_NAME }}.azurewebsites.net}"

          [[ -n "$KV_URI"       ]] && echo "  Key Vault URI  : $KV_URI"
          [[ -n "$OAI_ENDPOINT" ]] && echo "  OpenAI Endpoint: $OAI_ENDPOINT"

          echo "  API URL        : $WEBAPP_URL"
          echo ""

          if [[ "$DEPLOY_STATUS" == "success" ]]; then
            if [[ "$PROV_STATUS" == "failure" ]]; then
              echo "  ✅ SupremeAI backend is live."
              echo "  ⚠️  Provisioning failed – infrastructure may be out of date."
              echo "     Fix the OIDC/Azure credentials to enable full infrastructure provisioning."
            else
              echo "  ✅ SupremeAI backend is live!"
            fi
          elif [[ "$DEPLOY_STATUS" == "skipped" ]]; then
            if [[ "${{ needs.validate-secrets.outputs.has_publish_profile }}" != "true" && "${{ needs.validate-secrets.outputs.has_oidc_creds }}" != "true" ]]; then
              echo "  ⏭  Deployment skipped – neither OIDC secrets nor PUBLISH_PROFILE are configured."
              echo "     Run scripts/azure/setup-github-oidc.sh to configure automated deployment."
            else
              echo "  ⏭  Deployment was skipped (build or provision step did not complete)."
            fi
          else
            echo "  ❌ Deployment failed – review the job logs above for details."
            exit 1
          fi
          echo ""
