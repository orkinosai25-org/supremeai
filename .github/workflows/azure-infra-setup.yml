# Provisions Azure AI infrastructure for SupremeAI using Bicep templates.
# Triggered manually via workflow_dispatch only.
#
# PREREQUISITES — configure the following repository secrets before running:
#   AZURE_CLIENT_ID       – App Registration (client) ID
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Azure subscription ID
#
# AUTHENTICATION — choose one of:
#   Option A (OIDC / Workload Identity Federation — preferred, no long-lived secret):
#     Add a federated identity credential on the App Registration for:
#       Issuer:  https://token.actions.githubusercontent.com
#       Subject: repo:orkinosai25-org/supremeai:ref:refs/heads/main
#     See: https://learn.microsoft.com/azure/developer/github/connect-from-azure
#
#   Option B (Client Secret — simpler, works without federated credentials):
#     Add AZURE_CLIENT_SECRET as a repository secret.
#     The workflow detects the secret automatically and uses it instead of OIDC.

name: Azure Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure resource group name'
        required: false
        default: 'supremeai-rg'
      location:
        description: 'Azure region'
        required: false
        default: 'eastus'
      base_name:
        description: 'Base name for all resources'
        required: false
        default: 'supremeai'

permissions:
  id-token: write   # Required for OIDC token exchange with Azure
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets are set
        run: |
          missing=()
          [ -z "$CLIENT_ID" ]       && missing+=("AZURE_CLIENT_ID")
          [ -z "$TENANT_ID" ]       && missing+=("AZURE_TENANT_ID")
          [ -z "$SUBSCRIPTION_ID" ] && missing+=("AZURE_SUBSCRIPTION_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            echo "  Go to Settings → Secrets and variables → Actions and add the missing secrets."
            exit 1
          fi
          echo "All required secrets are present."
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure (OIDC or Client Secret)
        id: azure_login
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # When AZURE_CLIENT_SECRET is set the action uses SP credentials.
          # When it is empty the action falls back to OIDC / Workload Identity.
          client-secret:   ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Check Azure login result
        if: steps.azure_login.outcome != 'success'
        run: |
          echo "::error::Azure login failed."
          echo ""
          echo "  To fix, choose one of the two authentication options:"
          echo ""
          echo "  OPTION A — OIDC / Workload Identity Federation (no long-lived secret):"
          echo "    1. Open the App Registration in the Azure Portal."
          echo "    2. Go to Certificates & secrets → Federated credentials → Add credential."
          echo "    3. Choose 'GitHub Actions deploying Azure resources'."
          echo "    4. Set:"
          echo "         Organisation: orkinosai25-org"
          echo "         Repository:   supremeai"
          echo "         Entity:       Branch"
          echo "         Branch:       main"
          echo "       This creates the required subject: repo:${{ github.repository }}:ref:refs/heads/main"
          echo "    5. Re-run this workflow — no extra secrets needed."
          echo "    Docs: https://learn.microsoft.com/azure/developer/github/connect-from-azure"
          echo ""
          echo "  OPTION B — Client Secret (simpler, works immediately):"
          echo "    1. In the App Registration, go to Certificates & secrets → New client secret."
          echo "    2. Copy the secret value."
          echo "    3. Add it as repository secret AZURE_CLIENT_SECRET."
          echo "    4. Re-run this workflow."
          exit 1

      - name: Register required Azure resource providers
        run: |
          for provider in \
            Microsoft.CognitiveServices \
            Microsoft.MachineLearningServices \
            Microsoft.KeyVault \
            Microsoft.Storage \
            Microsoft.Web; do
            state=$(az provider show --namespace "$provider" --query "registrationState" -o tsv 2>/dev/null || echo "NotRegistered")
            if [ "$state" != "Registered" ]; then
              echo "Registering $provider..."
              az provider register --namespace "$provider" --wait
            else
              echo "$provider - already registered"
            fi
          done

      - name: Create resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group || 'supremeai-rg' }}" \
            --location "${{ github.event.inputs.location || 'eastus' }}" \
            --tags project=SupremeAI \
            --output none

      - name: Deploy Azure infrastructure (Bicep)
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          resourceGroupName: ${{ github.event.inputs.resource_group || 'supremeai-rg' }}
          template:          scripts/azure/main.bicep
          parameters: >
            baseName=${{ github.event.inputs.base_name || 'supremeai' }}
            location=${{ github.event.inputs.location || 'eastus' }}
          deploymentName: supremeai-infra-${{ github.run_number }}
          failOnStdErr: false

      - name: Print deployment outputs
        run: |
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  Azure infrastructure provisioning complete  "
          echo "══════════════════════════════════════════════"
          echo "  Key Vault URI    : ${{ steps.bicep.outputs.keyVaultUri }}"
          echo "  OpenAI Endpoint  : ${{ steps.bicep.outputs.openAiEndpoint }}"
          echo "  Web App Name     : ${{ steps.bicep.outputs.webAppName }}"
          echo "  Web App URL      : ${{ steps.bicep.outputs.webAppUrl }}"
          echo ""

