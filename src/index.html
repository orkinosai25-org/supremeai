<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupremeAI — Multi-Model Platform</title>
  <link rel="icon" type="image/svg+xml" href="../branding/favicon.svg"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="dark-theme">

  <!-- ─── HEADER ─── -->
  <header class="app-header">
    <div class="header-inner">
      <a href="#" class="brand-logo" aria-label="SupremeAI home">
        <img src="../branding/favicon.svg" alt="" class="brand-icon" width="36" height="36"/>
        <span class="brand-text">
          <span class="brand-s">S</span><span class="brand-upreme">UPREME</span><span class="brand-ai">ai</span>
        </span>
      </a>

      <nav class="header-nav" aria-label="Main navigation">
        <a href="#" class="nav-link active">Chat</a>
        <a href="#" class="nav-link">Arena</a>
        <a href="#" class="nav-link">Benchmarks</a>
        <a href="#" class="nav-link">Settings</a>
      </nav>

      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button class="btn btn-primary btn-sm">Sign In</button>
      </div>
    </div>
  </header>

  <!-- ─── MAIN ─── -->
  <main class="app-main">

    <!-- ─── MODEL SELECTOR PANEL ─── -->
    <aside class="model-panel" aria-label="Model selection">
      <div class="panel-header">
        <h2 class="panel-title">Models</h2>
        <span class="panel-badge" id="selectedCount">All</span>
      </div>

      <!-- Quick-select tabs -->
      <div class="quick-select" role="group" aria-label="Quick model selection">
        <button class="quick-btn active" data-mode="all"     id="btnAll">All</button>
        <button class="quick-btn"        data-mode="default" id="btnDefault">Default</button>
        <button class="quick-btn"        data-mode="custom"  id="btnCustom">Custom</button>
      </div>

      <!-- Model list -->
      <ul class="model-list" id="modelList" role="listbox" aria-multiselectable="true" aria-label="Available models">
        <!-- Populated by JS -->
      </ul>
    </aside>

    <!-- ─── CHAT AREA ─── -->
    <section class="chat-area" aria-label="Chat">

      <!-- Response columns header (shows when >1 model active) -->
      <div class="response-header" id="responseHeader" hidden>
        <div class="response-tabs" id="responseTabs" role="tablist">
          <!-- Tabs populated by JS -->
        </div>
      </div>

      <!-- Response columns -->
      <div class="response-grid" id="responseGrid">
        <div class="empty-state" id="emptyState">
          <img src="../branding/logo-mascot.svg" alt="SupremeAI mascot" width="120" height="120" class="empty-mascot"/>
          <p class="empty-title">Ask anything</p>
          <p class="empty-sub">Select models above, then type your prompt.</p>
        </div>
      </div>

      <!-- Prompt bar -->
      <div class="prompt-bar-wrap">
        <form class="prompt-bar" id="promptForm" autocomplete="off">
          <div class="prompt-input-wrap">
            <textarea
              id="promptInput"
              class="prompt-input"
              rows="1"
              placeholder="Ask all selected models…"
              aria-label="Prompt"
              maxlength="8000"
            ></textarea>
          </div>
          <div class="prompt-actions">
            <span class="char-count" id="charCount">0 / 8,000</span>
            <button type="submit" class="btn btn-primary btn-send" id="sendBtn" disabled aria-label="Send prompt">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
