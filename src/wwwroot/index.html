<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supreme Model T‑X — Multi-Model AI Platform</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="https://unpkg.com/@fluentui/web-components/dist/web-components.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/supremeai.css" />
    <link rel="icon" href="../branding/favicon.svg" type="image/svg+xml" />
    <link href="SupremeAI.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="sai-loading">
            <div class="sai-loading-crown">
                <video class="sai-loading-video" autoplay muted loop playsinline poster="images/new-logo.jpg"
                       onerror="this.style.display='none';document.getElementById('sai-crown-fallback').style.display='block'">
                    <source src="images/new-logo.mp4" type="video/mp4" />
                </video>
                <!-- Fallback crown SVG shown when video cannot load -->
                <svg id="sai-crown-fallback" viewBox="0 0 96 64" xmlns="http://www.w3.org/2000/svg"
                     role="img" aria-label="Supreme Model T‑X logo" style="display:none">
                    <defs>
                        <linearGradient id="lg-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFE566" />
                            <stop offset="50%" stop-color="#FFD700" />
                            <stop offset="100%" stop-color="#B8860B" />
                        </linearGradient>
                    </defs>
                    <rect x="4" y="42" width="88" height="14" rx="4" fill="url(#lg-gold)" opacity="0.9" />
                    <polygon points="8,42 8,16 26,30 48,4 70,30 88,16 88,42" fill="url(#lg-gold)" opacity="0.9" />
                    <ellipse cx="48" cy="5" rx="7" ry="5" fill="#C6E8F5" />
                    <circle cx="10" cy="20" r="4" fill="#50C878" />
                    <circle cx="86" cy="20" r="4" fill="#50C878" />
                </svg>
            </div>
            <p class="sai-loading-text">Supreme Model T‑X</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.saiDownloadText = function (filename, content) {
            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
        window.saiDownloadUrl = function (url, filename) {
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
        window.saiRenderGrooveMakerImage = function (config) {
            const isX = config && config.platform === "x";
            const width = isX ? 1200 : 1080;
            const height = isX ? 675 : 1080;
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            if (!ctx) return "";

            const background = (config && config.backgroundCategory) || "minimal";
            if (background === "gradient") {
                const grad = ctx.createLinearGradient(0, 0, width, height);
                grad.addColorStop(0, "#4F46E5");
                grad.addColorStop(1, "#06B6D4");
                ctx.fillStyle = grad;
            } else if (background === "business") {
                const grad = ctx.createLinearGradient(0, 0, width, height);
                grad.addColorStop(0, "#0B1220");
                grad.addColorStop(1, "#1F2937");
                ctx.fillStyle = grad;
            } else if (background === "fun") {
                const grad = ctx.createLinearGradient(0, 0, width, height);
                grad.addColorStop(0, "#F97316");
                grad.addColorStop(0.5, "#EC4899");
                grad.addColorStop(1, "#8B5CF6");
                ctx.fillStyle = grad;
            } else {
                ctx.fillStyle = "#111827";
            }
            ctx.fillRect(0, 0, width, height);

            const margin = Math.round(Math.min(width, height) * 0.09);
            const textWidth = width - (margin * 2);
            const textHeight = height - (margin * 2) - 54;

            const text = ((config && config.text) || "").trim() || "Your message";
            const words = text.split(/\s+/).filter(Boolean);
            const minFont = 30;
            let fontSize = isX ? 88 : 102;
            let lines = [];
            let lineHeight = 0;

            const toLines = (size) => {
                ctx.font = `700 ${size}px Inter, Segoe UI, Arial, sans-serif`;
                const next = [];
                let current = "";
                for (const word of words) {
                    const candidate = current ? `${current} ${word}` : word;
                    if (ctx.measureText(candidate).width <= textWidth) {
                        current = candidate;
                    } else {
                        if (current) next.push(current);
                        current = word;
                    }
                }
                if (current) next.push(current);
                return next;
            };

            while (fontSize >= minFont) {
                lines = toLines(fontSize);
                lineHeight = Math.round(fontSize * 1.22);
                if ((lines.length * lineHeight) <= textHeight) break;
                fontSize -= 4;
            }

            const boxHeight = Math.max(lines.length * lineHeight + 44, 96);
            const boxY = Math.round((height - boxHeight) / 2);
            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.beginPath();
            const radius = 20;
            ctx.moveTo(margin + radius, boxY);
            ctx.lineTo(width - margin - radius, boxY);
            ctx.quadraticCurveTo(width - margin, boxY, width - margin, boxY + radius);
            ctx.lineTo(width - margin, boxY + boxHeight - radius);
            ctx.quadraticCurveTo(width - margin, boxY + boxHeight, width - margin - radius, boxY + boxHeight);
            ctx.lineTo(margin + radius, boxY + boxHeight);
            ctx.quadraticCurveTo(margin, boxY + boxHeight, margin, boxY + boxHeight - radius);
            ctx.lineTo(margin, boxY + radius);
            ctx.quadraticCurveTo(margin, boxY, margin + radius, boxY);
            ctx.closePath();
            ctx.fill();

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#FFFFFF";
            ctx.font = `700 ${fontSize}px Inter, Segoe UI, Arial, sans-serif`;
            const startY = boxY + ((boxHeight - (lines.length * lineHeight)) / 2) + (lineHeight / 2);
            lines.forEach((line, idx) => {
                ctx.fillText(line, width / 2, startY + (idx * lineHeight));
            });

            const overlay = config && config.overlay;
            if (overlay === "heart") {
                ctx.font = `${Math.round(Math.min(width, height) * 0.1)}px Segoe UI Emoji, Apple Color Emoji, sans-serif`;
                ctx.globalAlpha = 0.9;
                ctx.fillText("❤️", width - margin, margin + 15);
                ctx.globalAlpha = 1;
            } else if (overlay === "arrow") {
                ctx.font = `${Math.round(Math.min(width, height) * 0.1)}px Segoe UI Emoji, Apple Color Emoji, sans-serif`;
                ctx.globalAlpha = 0.9;
                ctx.fillText("➡️", width - margin, margin + 15);
                ctx.globalAlpha = 1;
            }

            if (config && config.frame === "celebration") {
                ctx.strokeStyle = "rgba(255,255,255,0.9)";
                ctx.lineWidth = Math.max(6, Math.round(Math.min(width, height) * 0.008));
                ctx.strokeRect(14, 14, width - 28, height - 28);
                const confetti = ["#F59E0B", "#10B981", "#60A5FA", "#F472B6", "#A78BFA"];
                for (let i = 0; i < 18; i++) {
                    ctx.fillStyle = confetti[i % confetti.length];
                    const x = (i % 9) * (width / 9) + 20;
                    const y = i < 9 ? 22 : height - 22;
                    ctx.fillRect(x, y, 14, 8);
                }
            }

            ctx.textAlign = "right";
            ctx.textBaseline = "bottom";
            ctx.font = `${Math.round(Math.min(width, height) * 0.028)}px Inter, Segoe UI, Arial, sans-serif`;
            ctx.fillStyle = "rgba(255,255,255,0.86)";
            ctx.fillText("Made with GrooveMaker", width - margin, height - Math.round(margin * 0.45));

            return canvas.toDataURL("image/png");
        };
    </script>
</body>

</html>
